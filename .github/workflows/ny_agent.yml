name: NY FlyUSS SEO Agent

on:
  schedule:
    - cron: '0,30 * * * *'  # every 30 minutes
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run NY agent
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2:   ${{ secrets.GROQ_API_KEY_2 }}
          GH_TOKEN:         ${{ secrets.GH_TOKEN }}
          NY_PAGES_REPO:    ${{ secrets.NY_PAGES_REPO }}
          NY_INDEXNOW_KEY:  ${{ secrets.NY_INDEXNOW_KEY }}
          NY_SITE_URL:      https://ny.flyuss.com
        run: python agent_ny.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "🗽 NY agent run $(date -u '+%Y-%m-%d %H:%M')"
          git push
